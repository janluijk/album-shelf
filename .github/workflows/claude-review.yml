name: Claude Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for correctness bugs, security issues
            (especially around auth and data ownership), and deviations from
            the conventions in CLAUDE.md. Be concise: only flag things that
            matter, with file and line references. If everything looks good,
            say so briefly.
          claude_args: |
            --allowedTools "Bash(gh pr:*),Bash(gh api:*),Read,Grep,Glob"
