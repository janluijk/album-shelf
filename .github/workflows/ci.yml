name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'backlog/**'
      - '**.md'

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  AUTH_SECRET: ci-only-secret

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
